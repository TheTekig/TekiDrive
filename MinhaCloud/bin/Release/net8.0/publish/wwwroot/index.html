<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TekigCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3d;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e8e8f0;
            --muted: #6b6b8a;
            --success: #43e97b;
            --danger: #ff6584;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

            /* ── GRID BG ── */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
                background-size: 40px 40px;
                opacity: 0.3;
                pointer-events: none;
                z-index: 0;
            }

        /* ── AUTH ── */
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: var(--bg);
        }

        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            animation: fadeUp .5s ease both;
        }

            .auth-box::before {
                content: '';
                position: absolute;
                top: -1px;
                left: 20%;
                right: 20%;
                height: 2px;
                background: linear-gradient(90deg, transparent, var(--accent), transparent);
                border-radius: 2px;
            }

        .logo {
            font-family: var(--sans);
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

            .logo span {
                color: var(--accent);
            }

        .auth-sub {
            color: var(--muted);
            font-size: 13px;
            font-family: var(--mono);
            margin-bottom: 36px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 28px;
            background: var(--bg);
            padding: 4px;
            border-radius: 10px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

            .tab.active {
                background: var(--accent);
                color: #fff;
            }

        .field {
            margin-bottom: 16px;
        }

            .field label {
                display: block;
                font-size: 11px;
                font-family: var(--mono);
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 6px;
            }

            .field input {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 12px 14px;
                color: var(--text);
                font-family: var(--mono);
                font-size: 14px;
                outline: none;
                transition: border-color .2s;
            }

                .field input:focus {
                    border-color: var(--accent);
                }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity .2s, transform .1s;
        }

            .btn-primary:hover {
                opacity: 0.88;
            }

            .btn-primary:active {
                transform: scale(0.98);
            }

        .auth-msg {
            margin-top: 14px;
            font-size: 13px;
            font-family: var(--mono);
            text-align: center;
            min-height: 20px;
        }

            .auth-msg.ok {
                color: var(--success);
            }

            .auth-msg.err {
                color: var(--danger);
            }

        /* ── APP ── */
        #app-screen {
            display: none;
            position: relative;
            z-index: 1;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .topbar-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

            .topbar-logo span {
                color: var(--accent);
            }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-badge {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 16px;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
        }

            .btn-logout:hover {
                border-color: var(--danger);
                color: var(--danger);
            }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ── STATS ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
            animation: fadeUp .4s ease both;
        }

        .stat-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* ── DROP ZONE ── */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            margin-bottom: 32px;
            position: relative;
            animation: fadeUp .5s ease both;
        }

            .drop-zone:hover, .drop-zone.drag-over {
                border-color: var(--accent);
                background: rgba(108,99,255,.06);
            }

        .drop-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .drop-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .drop-sub {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .btn-upload {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
        }

            .btn-upload:hover {
                opacity: 0.88;
            }

        #file-input {
            display: none;
        }

        .progress-bar-wrap {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            width: 0%;
            transition: width .3s;
            border-radius: 2px;
        }

        /* ── FILE LIST ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .file-count {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .file-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: fadeUp .3s ease both;
            transition: border-color .2s;
        }

            .file-card:hover {
                border-color: var(--accent);
            }

        .file-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-meta {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all .2s;
        }

            .btn-icon:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            .btn-icon.danger:hover {
                border-color: var(--danger);
                color: var(--danger);
            }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 13px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 20px;
            font-family: var(--mono);
            font-size: 13px;
            z-index: 100;
            transform: translateY(80px);
            opacity: 0;
            transition: all .3s;
            max-width: 320px;
        }

            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }

            .toast.ok {
                border-left: 3px solid var(--success);
            }

            .toast.err {
                border-left: 3px solid var(--danger);
            }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .topbar {
                padding: 14px 16px;
            }

            .main {
                padding: 24px 16px;
            }

            .auth-box {
                padding: 32px 24px;
                margin: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div id="auth-screen">
        <div class="auth-box">
            <div class="logo">Tekig<span>Cloud</span></div>
            <div class="auth-sub">// seu armazenamento privado</div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Cadastro</button>
            </div>

            <div id="form-login">
                <div class="field"><label>E-mail</label><input id="login-email" type="email" placeholder="seu@email.com" /></div>
                <div class="field"><label>Senha</label><input id="login-pass" type="password" placeholder="••••••••" /></div>
                <button class="btn-primary" onclick="login()">Entrar</button>
            </div>

            <div id="form-register" style="display:none">
                <div class="field"><label>Nome</label><input id="reg-name" type="text" placeholder="Seu nome" /></div>
                <div class="field"><label>E-mail</label><input id="reg-email" type="email" placeholder="seu@email.com" /></div>
                <div class="field"><label>Senha</label><input id="reg-pass" type="password" placeholder="••••••••" /></div>
                <button class="btn-primary" onclick="register()">Criar conta</button>
            </div>

            <div class="auth-msg" id="auth-msg"></div>
        </div>
    </div>

    <!-- APP -->
    <div id="app-screen">
        <div class="topbar">
            <div class="topbar-logo">Tekig<span>Cloud</span></div>
            <div class="topbar-right">
                <div class="user-badge" id="user-badge">carregando...</div>
                <button class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>

        <div class="main">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Arquivos</div>
                    <div class="stat-value" id="stat-files">0</div>
                </div>
                <div class="stat-card" style="animation-delay:.08s">
                    <div class="stat-label">Armazenado</div>
                    <div class="stat-value" id="stat-size">0 MB</div>
                </div>
                <div class="stat-card" style="animation-delay:.16s">
                    <div class="stat-label">Compartilhados</div>
                    <div class="stat-value" id="stat-shared">0</div>
                </div>
            </div>

            <div class="drop-zone" id="drop-zone"
                 ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
                <div class="drop-icon">☁️</div>
                <div class="drop-title">Arraste arquivos aqui</div>
                <div class="drop-sub">ou clique no botão abaixo para selecionar</div>
                <button class="btn-upload" onclick="document.getElementById('file-input').click()">Selecionar arquivo</button>
                <input type="file" id="file-input" multiple onchange="uploadFiles(this.files)" />
                <div class="progress-bar-wrap" id="progress-wrap">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="section-header">
                <div class="section-title">Meus arquivos</div>
                <div class="file-count" id="file-count">0 arquivos</div>
            </div>

            <div class="file-list" id="file-list">
                <div class="empty-state">Nenhum arquivo ainda. Faça seu primeiro upload!</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'https://pursuable-imposing-word.ngrok-free.dev';
        let token = localStorage.getItem('tc_token');
        let userName = localStorage.getItem('tc_user');

        if (token) showApp();

        // ── AUTH ──
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1)));
            document.getElementById('form-login').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
            document.getElementById('auth-msg').textContent = '';
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const msg = document.getElementById('auth-msg');
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();
                if (!res.ok) { msg.className = 'auth-msg err'; msg.textContent = data; return; }
                token = data.token;
                const payload = JSON.parse(atob(token.split('.')[1]));
                userName = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name'];
                localStorage.setItem('tc_token', token);
                localStorage.setItem('tc_user', userName);
                showApp();
            } catch { msg.className = 'auth-msg err'; msg.textContent = 'Erro de conexão.'; }
        }

        async function register() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const msg = document.getElementById('auth-msg');
            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: name, email, password: pass })
                });
                const data = await res.text();
                if (!res.ok) { msg.className = 'auth-msg err'; msg.textContent = data; return; }
                msg.className = 'auth-msg ok'; msg.textContent = 'Conta criada! Faça login.';
                switchTab('login');
            } catch { msg.className = 'auth-msg err'; msg.textContent = 'Erro de conexão.'; }
        }

        function logout() {
            localStorage.removeItem('tc_token');
            localStorage.removeItem('tc_user');
            token = null;
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
        }

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-badge').textContent = userName || 'usuário';
            loadFiles();
        }

        // ── FILES ──
        async function loadFiles() {
            try {
                const res = await fetch(`${API}/api/files`, { headers: { Authorization: `Bearer ${token}` } });
                if (res.status === 401) { logout(); return; }
                const files = await res.json();
                renderFiles(files);
                updateStats(files);
            } catch { toast('Erro ao carregar arquivos.', 'err'); }
        }

        function renderFiles(files) {
            const list = document.getElementById('file-list');
            document.getElementById('file-count').textContent = `${files.length} arquivo${files.length !== 1 ? 's' : ''}`;
            if (!files.length) {
                list.innerHTML = '<div class="empty-state">Nenhum arquivo ainda. Faça seu primeiro upload!</div>';
                return;
            }
            list.innerHTML = files.map(f => `
          <div class="file-card" id="fc-${f.id}">
            <div class="file-icon">${fileEmoji(f.contentType)}</div>
            <div class="file-info">
              <div class="file-name" title="${f.originalName}">${f.originalName}</div>
              <div class="file-meta">${formatSize(f.sizeBytes)} · ${formatDate(f.createdAt)}</div>
            </div>
            <div class="file-actions">
              <button class="btn-icon" title="Download" onclick="downloadFile(${f.id},'${f.originalName}')">⬇️</button>
              <button class="btn-icon" title="Compartilhar" onclick="shareFile(${f.id})">🔗</button>
              <button class="btn-icon danger" title="Deletar" onclick="deleteFile(${f.id})">🗑️</button>
            </div>
          </div>`).join('');
        }

        function updateStats(files) {
            document.getElementById('stat-files').textContent = files.length;
            const total = files.reduce((s, f) => s + f.sizeBytes, 0);
            document.getElementById('stat-size').textContent = formatSize(total);
            document.getElementById('stat-shared').textContent = files.filter(f => f.hasShareLink).length;
        }

        // ── UPLOAD ──
        function onDragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
        function onDragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
        function onDrop(e) { e.preventDefault(); onDragLeave(); uploadFiles(e.dataTransfer.files); }

        async function uploadFiles(files) {
            for (const file of files) {
                const wrap = document.getElementById('progress-wrap');
                const bar = document.getElementById('progress-bar');
                wrap.style.display = 'block'; bar.style.width = '10%';

                const form = new FormData();
                form.append('file', file);
                try {
                    bar.style.width = '50%';
                    const res = await fetch(`${API}/api/files/upload`, {
                        method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form
                    });
                    bar.style.width = '100%';
                    if (!res.ok) { toast(`Erro ao enviar ${file.name}`, 'err'); }
                    else { toast(`${file.name} enviado!`, 'ok'); }
                } catch { toast('Erro de conexão no upload.', 'err'); }
                setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 600);
            }
            loadFiles();
        }

        // ── ACTIONS ──
        async function downloadFile(id, name) {
            const res = await fetch(`${API}/api/files/${id}/download`, { headers: { Authorization: `Bearer ${token}` } });
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
        }

        async function shareFile(id) {
            const res = await fetch(`${API}/api/files/${id}/share`, {
                method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ hoursValid: 24 })
            });
            const data = await res.json();
            await navigator.clipboard.writeText(data.url);
            toast('Link copiado! Válido por 24h.', 'ok');
        }

        async function deleteFile(id) {
            if (!confirm('Deletar este arquivo?')) return;
            await fetch(`${API}/api/files/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
            document.getElementById(`fc-${id}`)?.remove();
            toast('Arquivo deletado.', 'ok');
            loadFiles();
        }

        // ── UTILS ──
        function fileEmoji(type) {
            if (!type) return '📄';
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📕';
            if (type.includes('zip') || type.includes('rar')) return '📦';
            if (type.includes('word') || type.includes('document')) return '📝';
            return '📄';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return `${bytes} B`;
            if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
            if (bytes < 1024 ** 3) return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
            return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function toast(msg, type = 'ok') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
